version: '3.9'

services:
  postgres:
    container_name: postgres-shorter-link
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=${POSTRGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - 5465:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nestjs-course

volumes:
  postgres_data:

networks:
  nestjs-course:
